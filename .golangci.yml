version: "2"
run:
  go: "1.22"
linters:
  enable:
    - bodyclose
    - misspell
    - noctx
    - revive
    - unconvert
    - unparam
  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/lavaux/shlink-cli
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$

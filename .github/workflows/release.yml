name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  # ── Run tests before releasing ──────────────────────────────────────────────
  test:
    name: Pre-release tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - run: go test -race ./...

  # ── Build cross-platform binaries ───────────────────────────────────────────
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: "7"
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for git describe

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Set build variables
        id: vars
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          ASSET="shlink_${{ matrix.goos }}_${{ matrix.goarch }}${EXT}"
          go build \
            -ldflags "-s -w \
              -X 'github.com/lavaux/shlink-cli/internal/config.Version=${{ steps.vars.outputs.version }}' \
              -X 'github.com/lavaux/shlink-cli/internal/config.Commit=${{ steps.vars.outputs.commit }}' \
              -X 'github.com/lavaux/shlink-cli/internal/config.BuildDate=${{ steps.vars.outputs.date }}'" \
            -o "$ASSET" \
            ./cmd/shlink
          echo "ASSET=$ASSET" >> "$GITHUB_ENV"

      - name: Compress binary (non-Windows)
        if: matrix.goos != 'windows'
        run: |
          tar -czf "${ASSET}.tar.gz" "$ASSET"
          echo "UPLOAD=${ASSET}.tar.gz" >> "$GITHUB_ENV"

      - name: Compress binary (Windows)
        if: matrix.goos == 'windows'
        run: |
          zip "${ASSET%.exe}.zip" "$ASSET"
          echo "UPLOAD=${ASSET%.exe}.zip" >> "$GITHUB_ENV"

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.UPLOAD }}
          retention-days: 1

  # ── Create GitHub Release ───────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Extract changelog entry
        id: changelog
        run: |
          # Try to pull the relevant section from CHANGELOG.md; fall back gracefully.
          if [ -f CHANGELOG.md ]; then
            awk "/^## \[?${GITHUB_REF_NAME}\]?/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md \
              > release_notes.md
          else
            echo "Release ${GITHUB_REF_NAME}" > release_notes.md
          fi
          echo "file=release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: ${{ steps.changelog.outputs.file }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*
